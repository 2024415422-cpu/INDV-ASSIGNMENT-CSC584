<html>
<head>
    <title>Personal Profile Form</title>

    <link rel="stylesheet" href="style.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="viewProfiles.jsp">View Profiles</a>
    </div>

    <div class="container-box">

        <h1>Personal Profile Form</h1>

        <form action="ProfileServlet" method="post">

            <label>Name</label>
            <input type="text" name="name" required>

            <label>Student ID</label>
            <input type="text" name="studentId" required>

            <label>Programme</label>
            <input type="text" name="programme" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Hobbies</label>
            <input type="text" name="hobbies" required>

            <label>Short Self Introduction</label>
            <textarea name="intro" rows="5"></textarea>

            <button type="submit">Submit Profile</button>

        </form>

    </div>

</body>
</html>
